name: Deploy API to Render

on:
  push:
    branches: [ main ]

jobs:
  trigger-render-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deployment via API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Missing required GitHub secrets: RENDER_API_KEY or RENDER_SERVICE_ID" >&2
            exit 1
          fi

          echo "Triggering deployment for Render service $RENDER_SERVICE_ID"
          curl -s -X POST https://api.render.com/deployments \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"serviceId\":\"$RENDER_SERVICE_ID\"}" \
            | jq || true
