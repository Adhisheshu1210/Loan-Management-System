services:
  - type: web
    name: lms-api
    env: node
    plan: starter
    rootDir: .
    buildCommand: npm ci && npm run build --workspace @lms/api
    startCommand: npm run start --workspace @lms/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: CLIENT_ORIGIN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SERVER_ORIGIN
        sync: false
      - key: COOKIE_SECURE
        value: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: TWILIO_OTP_CONTENT_SID
        sync: false
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false
      - key: TWILIO_WEBHOOK_AUTH_TOKEN
        sync: false
      - key: EXTERNAL_WEBHOOK_URL
        sync: false
      - key: WIREWEB_WEBHOOK_TOKEN
        sync: false
      - key: LOCAL_UPLOAD_DIR
        value: uploads
